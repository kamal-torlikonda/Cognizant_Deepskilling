<!DOCTYPE html>
<html>
<head>
    <title>Local Storage Demo</title>
</head>
<body>

<input type="text" id="username">

<button onclick="saveData()">
Save
</button>

<script>

function saveData()
{
    let user =
    document.getElementById("username").value;

    localStorage.setItem("username", user);

    alert("Data Saved");
}

</script>

</body>
</html>
